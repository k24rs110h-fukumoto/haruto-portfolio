<section class="projects-section section-view" id="projects">
  <img class="projects-bg" src="assets/images/projects/bg-projects.png" alt="Projects Background" />

  <div class="projects-header">
    <h1>PROJECTS</h1>
    <p>これまでに制作・研究したプロジェクトをまとめています。</p>
  </div>

  <div class="project-tabs">
    <button class="project-tab active" data-category="all">ALL</button>
    <button class="project-tab" data-category="unity">Unity</button>
    <button class="project-tab" data-category="web">Web</button>
    <button class="project-tab" data-category="app">App</button>
  </div>

  <div class="project-scroll-area">
    <button class="scroll-btn left" id="projectScrollLeft">‹</button>

    <div class="project-card-row" id="projectCardRow">
      <!-- JSで画像カードを生成 -->
    </div>

    <button class="scroll-btn right" id="projectScrollRight">›</button>
  </div>

  <div class="project-modal" id="projectModal" aria-hidden="true">
    <div class="project-modal-bg" id="projectModalBg"></div>

    <div class="project-modal-content">
      <button class="project-modal-close" id="projectModalClose" type="button">
        ×
      </button>

      <img id="projectModalImage" src="" alt="Project Detail" />
    </div>
  </div>
</section>
